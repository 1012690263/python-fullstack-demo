name: 🚀 Deploy to Server

on:
  push:
    branches: [main]

jobs:
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest || echo "No tests yet, skipping"

  build-and-deploy:
    name: 🐳 Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 构建镜像并导出（注意：docker compose，不是 docker-compose）
      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build
          docker save demo-backend demo-frontend demo-nginx -o images.tar

      # 上传镜像到服务器
      - name: Copy images to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "images.tar,docker-compose.yml,init.sql"
          target: "/opt/demo"

      # SSH 到服务器执行部署
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/demo
            docker load -i images.tar
            docker compose down        # ← 这里也要改！
            docker compose up -d       # ← 这里也要改！
            docker image prune -f
            rm -f images.tar
            echo "✅ Deployed successfully!"